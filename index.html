<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creator Learning Hub — LMS MCN</title>
<style>
  :root{
    --card:#fff; --ink:#2f2e41; --muted:#9aa1ad; --line:#eef0f4;
    --purple:#6c5ce7; --purple-soft:#efeafe;
    --peach:#fdeadf; --peach2:#f2955a;
    --pink:#fde3ec; --pink2:#ef6b8e;
    --green:#e2f5e9; --green2:#35c07a;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(160deg,#cfe0e8,#dfeef2);color:var(--ink);min-height:100vh}
  .wrap{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  .side{background:#fff;display:flex;flex-direction:column;padding:22px 16px;gap:6px}
  .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:20px;padding:6px 10px 22px}
  .logo .q{width:26px;height:26px;background:linear-gradient(135deg,var(--purple),#a29bfe);border-radius:6px 6px 6px 14px;transform:rotate(8deg)}
  .menu a{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;cursor:pointer}
  .menu a:hover{background:#f6f7fb;color:var(--ink)}
  .menu a.active{background:var(--purple);color:#fff;box-shadow:0 8px 18px rgba(108,92,231,.35)}
  .menu .sp{flex:1}
  .content{padding:20px 26px;display:flex;flex-direction:column;gap:20px}
  .topbar{display:flex;align-items:center;gap:18px;background:#fff;border-radius:var(--radius);padding:12px 18px}
  .topbar h1{font-size:19px}
  .search{flex:1;max-width:520px;display:flex;align-items:center;gap:10px;background:#f4f6fa;border-radius:12px;padding:10px 14px;color:var(--muted)}
  .search input{border:0;background:transparent;outline:0;width:100%;font-size:14px;color:var(--ink)}
  .topbar .sp{flex:1}
  .icon-btn{width:38px;height:38px;border-radius:10px;background:#f4f6fa;border:0;display:grid;place-items:center;cursor:pointer;position:relative;font-size:16px}
  .dot-red{position:absolute;top:9px;right:10px;width:7px;height:7px;background:#ff5c7c;border-radius:50%}
  .profile{display:flex;align-items:center;gap:8px;background:#f4f6fa;border-radius:30px;padding:5px 12px 5px 5px;cursor:pointer}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe)}
  .main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
  .col{display:flex;flex-direction:column;gap:20px}
  .card{background:#fff;border-radius:var(--radius);padding:20px}
  .card h2{font-size:16px;margin-bottom:16px}
  .now{display:flex;align-items:center;gap:14px;padding:14px 16px}
  .thumb{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#ff9a8b,#ff6a88,#a18cd1);flex:none}
  .now .info{flex:1;min-width:0}
  .now .info b{font-size:14px}
  .now .line{height:6px;background:#eef0f4;border-radius:6px;margin-top:8px;overflow:hidden}
  .now .line>span{display:block;height:100%;background:var(--purple)}
  .counts{display:flex;gap:14px;color:var(--muted);font-size:13px}
  .counts span{display:flex;align-items:center;gap:4px;white-space:nowrap}
  .resume{display:flex;align-items:center;gap:8px;background:var(--purple-soft);color:var(--purple);border:0;padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .stat{border-radius:16px;padding:18px;display:flex;justify-content:space-between;align-items:center}
  .stat.peach{background:var(--peach)} .stat.pink{background:var(--pink)} .stat.green{background:var(--green)}
  .stat .bignum{font-size:26px;font-weight:800}
  .stat .lbl{font-weight:600;font-size:14px;margin-top:2px}
  .stat .sub{color:var(--muted);font-size:11px;margin-top:3px}
  .badge-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;margin-bottom:10px}
  .peach .badge-ic{background:#f7c9a8} .pink .badge-ic{background:#f7bcce} .green .badge-ic{background:#bfe9cf}
  .ring{width:60px;height:60px;border-radius:50%;display:grid;place-items:center}
  .ring .in{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700}
  .peach .ring .in{background:var(--peach)} .pink .ring .in{background:var(--pink)} .green .ring .in{background:var(--green)}
  .seg{display:flex;gap:6px;background:#f4f6fa;border-radius:10px;padding:4px}
  .seg button{border:0;background:transparent;padding:6px 14px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;font-weight:600}
  .seg button.on{background:#fff;color:var(--purple);box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .crow{display:grid;grid-template-columns:1.7fr 1.1fr 1fr;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--line)}
  .crow .name{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600}
  .cico{width:36px;height:36px;border-radius:10px;flex:none}
  .cbar{height:6px;background:#eef0f4;border-radius:6px;overflow:hidden}
  .cbar>span{display:block;height:100%}
  .thead{display:grid;grid-template-columns:1.7fr 1.1fr 1fr;color:var(--muted);font-size:12px;font-weight:600;padding-bottom:6px}
  .cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-top .nav{display:flex;gap:6px}
  .cal-top button{width:26px;height:26px;border-radius:8px;border:0;background:#f4f6fa;cursor:pointer}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
  .cal .dn{color:var(--muted);font-size:11px;font-weight:600;padding-bottom:4px}
  .cal .day{aspect-ratio:1;display:grid;place-items:center;border-radius:50%;font-size:12px}
  .cal .day.mut{color:#cdd2db}
  .cal .day.range{background:var(--purple-soft);color:var(--purple);font-weight:700}
  .cal .day.today{background:var(--purple);color:#fff;font-weight:700}
  .up{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .up:first-of-type{border-top:0}
  .datechip{width:44px;height:46px;border-radius:12px;background:#f4f6fa;display:grid;place-items:center;text-align:center;line-height:1.1;flex:none}
  .datechip b{font-size:15px} .datechip small{font-size:10px;color:var(--muted)}
  .up .t b{font-size:13px} .up .t small{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:3px}
  .tagdot{width:7px;height:7px;border-radius:50%}
  /* functional */
  .btn{background:var(--purple);color:#fff;border:0;padding:9px 15px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
  .btn.ghost{background:#f4f6fa;color:var(--ink)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input,.toolbar select{max-width:230px}
  .grid{display:grid;gap:16px}.col3{grid-template-columns:repeat(3,1fr)}.col2{grid-template-columns:repeat(2,1fr)}
  .tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:999px;background:#f4f6fa;color:var(--muted);margin-right:6px}
  .tag.lv{color:#fff}.lv.Basic{background:#35c07a}.lv.Intermediate{background:#f2955a}.lv.Advanced{background:#ef6b8e}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:600}
  .pill.done{background:var(--green);color:#1f9d5c}.pill.prog{background:var(--peach);color:#c8721f}.pill.todo{background:#f0f1f5;color:var(--muted)}
  input,select,textarea{width:100%;background:#f4f6fa;border:1px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:10px;font-size:14px;font-family:inherit}
  label{font-size:12px;color:var(--muted);display:block;margin:0 0 6px}
  .field{margin-bottom:14px}.row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:0}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  .center{text-align:center}
  .modal{position:fixed;inset:0;background:rgba(20,20,40,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
  .modal.open{display:flex}
  .modal .box{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:560px;max-height:88vh;overflow:auto}
  .modal h2{margin:0 0 16px;font-size:18px}
  .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
  .check{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f4f6fa;border-radius:10px;margin-bottom:8px;cursor:pointer}
  .check input{width:auto}
  .lesson{font-size:14px;line-height:1.7}
  .lesson p{margin:0 0 10px}
  .quiz-q{margin-bottom:16px}.quiz-q .opt{display:flex;align-items:center;gap:8px;margin:6px 0}.quiz-q .opt input{width:auto}
  .muted{color:var(--muted)}
  .testcard{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#f9fafc;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0}
  .sech{font-size:12px;font-weight:700;color:var(--muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .slidestage{background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:16px;color:#fff;padding:34px 30px;min-height:340px;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .slidestage.alt{background:linear-gradient(135deg,#ef6b8e,#f2955a)}
  .slidestage.title-slide{justify-content:center}
  .slidestage .kicker{font-size:12px;letter-spacing:.12em;text-transform:uppercase;opacity:.85;font-weight:700}
  .slidestage h1{font-size:28px;line-height:1.15;margin:8px 0}
  .slidestage h3{font-size:21px;margin:0 0 14px;font-weight:800}
  .slidestage ul{margin:0;padding-left:20px}
  .slidestage li{font-size:15px;line-height:1.55;margin-bottom:9px}
  .slidestage p{font-size:15px;line-height:1.5}
  .slidestage .snum{position:absolute;top:16px;right:20px;font-size:12px;opacity:.75;font-weight:700}
  .slidestage .badge{display:inline-block;background:rgba(255,255,255,.22);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;margin-right:6px}
  .slidestage a{color:#fff}
  .slidenav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .slidedots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;flex:1}
  .slidedots span{width:8px;height:8px;border-radius:50%;background:#d9def0;cursor:pointer}
  .slidedots span.on{background:var(--purple)}
  #slideWrap:fullscreen{background:linear-gradient(160deg,#1a1a2e,#16213e);padding:5vh 6vw;display:flex;flex-direction:column;justify-content:center}
  #slideWrap:fullscreen .slidestage{min-height:74vh;padding:6vh 6vw;justify-content:center}
  #slideWrap:fullscreen .slidestage h1{font-size:46px}
  #slideWrap:fullscreen .slidestage h3{font-size:34px}
  #slideWrap:fullscreen .slidestage li{font-size:24px;margin-bottom:16px}
  #slideWrap:fullscreen .slidestage p{font-size:22px}
  #slideWrap:fullscreen .fskbd{color:#9aa1c4}
  @media(max-width:1000px){.main-grid,.col3,.col2{grid-template-columns:1fr}.wrap{grid-template-columns:1fr}.side{flex-direction:row;flex-wrap:wrap;align-items:center}.menu{display:flex;flex-wrap:wrap}.stat-grid{grid-template-columns:1fr}}
</style>
</head>

<script>

const KEY='mcn_lms_combined_v4';
const CATS=['Content Strategy','Monetisasi','Brand Deal','Editing & Produksi','Algoritma Platform','Personal Branding','Legal & Kontrak'];
const LEVELS=['Basic','Intermediate','Advanced'];
const PLATFORMS=['TikTok','YouTube','Instagram','Twitch','Multi'];

const COLORS=['#6c5ce7','#ef6b8e','#f2955a','#35c07a','#00b3c6','#e17055'];

function id(){return Math.random().toString(36).slice(2,9)}
function seed(){
  const courses=[
    {id:id(),title:'Onboarding Talent MCN',cat:'Personal Branding',level:'Basic',hours:2,desc:'Pengenalan sistem MCN, hak & kewajiban talent, cara kerja bagi hasil.',modules:[
      {t:'Apa itu MCN',vid:'jSK6jvCDQxA',body:'MCN (Multi-Channel Network) adalah perusahaan yang bermitra dengan banyak creator untuk membantu pertumbuhan channel, monetisasi, dan manajemen.\nMCN menyediakan dukungan seperti optimasi konten, koneksi ke brand, perlindungan hak cipta, dan pelatihan.\nSebagai talent, kamu tetap pemilik konten. MCN adalah partner, bukan pemilik akunmu.'},
      {t:'Hak & kewajiban talent',vid:'HuFbje8G6gE',body:'Hak talent: mendapat bimbingan, akses brand deal, laporan performa, dan bagi hasil sesuai kontrak.\nKewajiban talent: menjaga konsistensi upload, mematuhi community guidelines, dan menjaga nama baik jaringan.\n• Selalu baca kontrak sebelum tanda tangan.\n• Tanyakan bagian yang belum jelas ke manajer talent.'},
      {t:'Alur kerja & bagi hasil',vid:'CtFqxUPdJQo',body:'Alur umum: brief menjadi produksi konten, lalu review, publish, dan laporan performa.\nBagi hasil biasanya berupa persentase dari revenue (mis. 70% talent / 30% MCN) atau flat fee per campaign.\nPembayaran mengikuti siklus bulanan setelah dana dari platform atau brand cair.'},
      {t:'Tools internal',vid:'8jnF-Gjn6OI',body:'Kenali tools yang dipakai jaringan: dashboard performa, kalender konten, dan channel komunikasi tim.\n• Gunakan kalender untuk deadline upload.\n• Laporkan kendala teknis lewat channel support.\n• Simpan aset (logo brand, guideline) di folder bersama.'}
    ],pre:[{q:'Apa fungsi utama MCN bagi creator?',opts:['Membeli akun creator','Membantu pertumbuhan, monetisasi & manajemen channel','Menggantikan creator membuat konten'],a:1},{q:'Dalam kemitraan MCN yang sehat, siapa pemilik konten & akun?',opts:['Talent tetap pemilik, MCN sebagai partner','MCN memiliki penuh','Platform yang memiliki'],a:0},{q:'Sebelum tanda tangan kontrak MCN, sikap paling bijak?',opts:['Langsung tanda tangan agar cepat','Membaca & memahami seluruh klausul','Mengabaikan bagian bagi hasil'],a:1}],post:[{q:'Skema bagi hasil 70% talent / 30% MCN adalah contoh dari?',opts:['Revenue sharing','Pajak penghasilan','Biaya platform'],a:0},{q:'Berikut kewajiban talent, KECUALI?',opts:['Konsisten upload','Menghapus akun tanpa alasan','Mematuhi community guidelines'],a:1},{q:'Kapan pembayaran ke talent biasanya dilakukan?',opts:['Setiap kali upload','Tidak ada jadwal','Mengikuti siklus bulanan setelah dana cair'],a:2},{q:'Kalender konten internal berguna untuk?',opts:['Mengatur deadline & jadwal upload','Mengedit video','Mengganti algoritma'],a:0}],final:[{q:'Hubungan talent dan MCN yang benar?',opts:['MCN partner, bukan pemilik akun','MCN wajib hapus konten lama','Talent kehilangan hak cipta'],a:0},{q:'Manakah HAK talent?',opts:['Tidak perlu upload','Mendapat laporan performa & akses brand deal','Bebas melanggar guideline'],a:1},{q:'Klausul kontrak yang belum dipahami sebaiknya?',opts:['Ditandatangani dulu','Diabaikan','Ditanyakan ke manajer sebelum tanda tangan'],a:2},{q:'Flat fee per campaign berarti?',opts:['Bayaran tetap untuk satu campaign','Persentase semua revenue','Tanpa bayaran'],a:0},{q:'Melaporkan kendala teknis lewat?',opts:['Media sosial pribadi','Channel support tim','Tidak dilaporkan'],a:1}]},
    {id:id(),title:'Content Strategy 101',cat:'Content Strategy',level:'Basic',hours:3,desc:'Menyusun pillar konten, kalender, dan hook yang menarik.',modules:[
      {t:'Content pillar',vid:'-IAS1d4hF5s',body:'Content pillar adalah 3 sampai 5 tema utama yang jadi identitas channel, misalnya edukasi, hiburan, dan behind the scene.\nPillar membantu audiens tahu apa yang bisa mereka harapkan dan menjaga konten tetap fokus.\n• Tentukan pillar dari kekuatan, minat, dan kebutuhan audiens.\n• Bagi porsi upload di tiap pillar secara seimbang.'},
      {t:'Hook & retention',vid:'AoDd48sElwI',body:'Hook adalah 3 detik pertama yang menentukan penonton lanjut atau scroll.\nGunakan pertanyaan, pernyataan mengejutkan, atau visual kuat di awal.\nRetention dijaga dengan pacing cepat, teks di layar, dan payoff di akhir.'},
      {t:'Content calendar',vid:'WpqgN8LE7gA',body:'Kalender konten membantu upload konsisten dan tidak kehabisan ide.\n• Rencanakan tema mingguan.\n• Batch produksi beberapa konten sekaligus.\n• Sisakan slot untuk konten tren yang mendadak.'},
      {t:'Riset tren',vid:'xaeI9pcVwZU',body:'Pantau halaman explore, sound yang sedang naik, dan hashtag relevan.\nAdaptasi tren ke pillar kamu, jangan ikut mentah-mentah.\nCatat tren yang cocok di kalender untuk dieksekusi cepat.'}
    ],pre:[{q:'Fungsi hook di awal video?',opts:['Menahan penonton di detik pertama','Menentukan warna thumbnail','Menambah ukuran file'],a:0},{q:'Content pillar adalah?',opts:['Jenis kamera','3-5 tema utama identitas channel','Aplikasi edit'],a:1},{q:'Manfaat content calendar?',opts:['Menaikkan resolusi','Mengubah algoritma','Upload konsisten & tidak kehabisan ide'],a:2}],post:[{q:'Cara menjaga retention penonton?',opts:['Pacing cepat & payoff di akhir','Memperlambat semua bagian','Menghapus teks'],a:0},{q:'Idealnya jumlah content pillar?',opts:['Lebih dari 20','3 sampai 5 tema','Hanya 1 selamanya'],a:1},{q:'Cara memanfaatkan tren dengan benar?',opts:['Meniru mentah-mentah','Mengabaikan semua tren','Mengadaptasi tren ke pillar sendiri'],a:2},{q:'Teknik batch produksi berarti?',opts:['Membuat beberapa konten sekaligus','Wajib upload satu per hari','Menghapus arsip'],a:0}],final:[{q:'Hook yang efektif bisa berupa?',opts:['Pertanyaan atau visual kuat di awal','Intro panjang 30 detik','Layar hitam'],a:0},{q:'Kenapa pillar penting bagi audiens?',opts:['Agar file lebih kecil','Agar audiens tahu ekspektasi konten','Agar warna berubah'],a:1},{q:'Menyisakan slot kosong di kalender untuk?',opts:['Iklan wajib','Tidak ada gunanya','Konten tren yang mendadak'],a:2},{q:'Sumber riset tren yang baik?',opts:['Explore, sound naik, hashtag relevan','Hanya menebak','Mengabaikan platform'],a:0},{q:'Retention paling terbantu oleh?',opts:['Video tanpa akhir jelas','Pacing cepat, teks, dan payoff','Durasi sangat panjang'],a:1}]},
    {id:id(),title:'Algoritma TikTok & Reels',cat:'Algoritma Platform',level:'Intermediate',hours:2,desc:'Memahami sinyal algoritma & optimasi distribusi.',modules:[
      {t:'Sinyal algoritma',vid:'EC1E94oqyPA',body:'Algoritma menilai konten dari watch time, completion rate, like, komentar, share, dan save.\nShare dan save biasanya berbobot paling besar karena menandakan konten bernilai.\nAlgoritma mendistribusikan ke audiens kecil dulu, lalu memperluas jika sinyal positif.'},
      {t:'Watch time & rewatch',vid:'fsSGDMWJAIU',body:'Watch time total dan rewatch (penonton mengulang) sangat kuat mendorong distribusi.\nBuat video yang mengundang ditonton ulang, misalnya loop mulus atau detail yang terlewat.\nDurasi ideal: cukup untuk menyampaikan nilai tanpa bertele-tele.'},

let MEM=null;
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return MEM;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){MEM=v;}}
function load(){try{const raw=lsGet(KEY);const d=raw?JSON.parse(raw):null;if(d&&d.courses)return d;}catch(e){}const s=seed();save(s);return s;}
function save(d){DB=d||DB;lsSet(KEY,JSON.stringify(DB));}
var DB=load();

function getEnroll(tid,cid){return DB.enroll.find(e=>e.tid===tid&&e.cid===cid);}
function prog(e){const c=courseById(e.cid);if(!c)return 0;const tot=c.modules.length;return tot?Math.round((e.done||[]).length/tot*100):0;}
function courseById(cid){return DB.courses.find(c=>c.id===cid);}
function talentById(tid){return DB.talents.find(t=>t.id===tid);}
function colorFor(i){return COLORS[i%COLORS.length];}
function courseComplete(e){const c=courseById(e.cid);if(!c)return false;return (e.done||[]).length>=c.modules.length&&e.pre!=null&&e.post!=null&&e.final!=null;}
function scoreCell(v){return v!=null?v+'%':'<span class="muted">-</span>';}
function testMeta(kind){return {pre:{label:'Pre-Test',icon:'📝',desc:'Ukur pemahaman awal sebelum belajar.'},post:{label:'Post-Test',icon:'✅',desc:'Cek pemahaman setelah menyelesaikan modul.'},final:{label:'Final Test',icon:'🏆',desc:'Ujian akhir komprehensif untuk kelulusan.'}}[kind];}
function testCard(kind,c,e,ei,locked){const meta=testMeta(kind);const sc=e[kind];const status=sc!=null?`<span class="pill done">${sc}%</span>`:`<span class="pill todo">Belum</span>`;const btn=locked?`<button class="btn sm ghost" disabled>🔒 Terkunci</button>`:`<button class="btn sm" data-test="${kind}">${sc!=null?'Ulangi':'Mulai'}</button>`;return `<div class="testcard"><div><b>${meta.icon} ${meta.label}</b> ${status}<div class="muted" style="font-size:12px;margin-top:2px">${meta.desc}</div></div>${btn}</div>`;}
function runTest(ei,kind){const e=DB.enroll[ei],c=courseById(e.cid),qs=c[kind]||[];const meta=testMeta(kind);if(!qs.length){alert('Belum ada soal untuk tes ini.');return;}openModal(`<h2>${meta.icon} ${meta.label} — ${esc(c.title)}</h2><p class="muted" style="font-size:12px;margin-bottom:12px">${qs.length} soal · pilih satu jawaban tiap nomor.</p><form id="tForm">${qs.map((q,qi)=>`<div class="quiz-q"><b>${qi+1}. ${esc(q.q)}</b>${q.opts.map((o,oi)=>`<label class="opt"><input type="radio" name="q${qi}" value="${oi}"/> ${esc(o)}</label>`).join('')}</div>`).join('')}</form><div class="actions"><button class="btn ghost" data-back2>← Kembali</button><button class="btn" id="submitTest">Submit</button></div>`);document.querySelector('[data-back2]').onclick=()=>openEnroll(ei);document.getElementById('submitTest').onclick=()=>{let correct=0;qs.forEach((q,qi)=>{const sel=document.querySelector('input[name=q'+qi+']:checked');if(sel&&+sel.value===q.a)correct++;});const score=Math.round(correct/qs.length*100);e[kind]=score;save();alert(meta.label+': '+score+'% ('+correct+'/'+qs.length+')');openEnroll(ei);};}

function dashData(){
  let modTot=0,modDone=0,tTot=0,tDone=0,cDone=0;
  DB.enroll.forEach(e=>{const c=courseById(e.cid);if(!c)return;modTot+=c.modules.length;modDone+=(e.done||[]).length;tTot+=3;['pre','post','final'].forEach(k=>{if(e[k]!=null)tDone++;});if(courseComplete(e))cDone++;});
  return {
    lessons:{n:modDone,tot:modTot,pct:modTot?Math.round(modDone/modTot*100):0},
    quiz:{n:tDone,tot:tTot,pct:tTot?Math.round(tDone/tTot*100):0},
    courses:{n:cDone,tot:DB.enroll.length,pct:DB.enroll.length?Math.round(cDone/DB.enroll.length*100):0}
  };
}

const DN=['Mo','Tu','We','Th','Fr','Sa','Su'];
const MN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
let curD=new Date();let viewD=new Date(curD.getFullYear(),curD.getMonth(),1);
function renderCal(){
  const y=viewD.getFullYear(),m=viewD.getMonth();
  let html=DN.map(d=>`<div class="dn">${d}</div>`).join('');
  let first=new Date(y,m,1).getDay();first=(first===0?7:first)-1;
  const days=new Date(y,m+1,0).getDate();
  for(let i=0;i<first;i++)html+='<div class="day mut"></div>';
  for(let d=1;d<=days;d++){const today=(d===curD.getDate()&&m===curD.getMonth()&&y===curD.getFullYear());const range=(d>curD.getDate()&&d<=curD.getDate()+4&&m===curD.getMonth()&&y===curD.getFullYear());let cls='day';if(today)cls+=' today';else if(range)cls+=' range';html+=`<div class="${cls}">${d}</div>`;}
  document.getElementById('cal').innerHTML=html;
  document.getElementById('calTitle').textContent=MN[m]+' '+y;
}

var SLIDES=[],SLIDEI=0;
function buildSlides(c){var s=[];s.push({cls:'title-slide',html:'<div class="kicker">Course</div><h1>'+esc(c.title)+'</h1><div style="margin:6px 0 14px"><span class="badge">'+esc(c.level)+'</span><span class="badge">'+esc(c.cat)+'</span><span class="badge">'+c.hours+' jam</span></div><p>'+esc(c.desc)+'</p>'});c.modules.forEach(function(m,mi){var lines=String(m.body||'').split('\n').map(function(l){return l.trim();}).filter(Boolean);var vid=m.vid?'<div style="margin-top:14px"><a href="https://www.youtube.com/watch?v='+m.vid+'" target="_blank" rel="noopener">▶ Tonton video modul ini</a></div>':'';s.push({cls:mi%2?'alt':'',html:'<div class="kicker">Modul '+(mi+1)+' / '+c.modules.length+'</div><h3>'+esc(m.t)+'</h3><ul>'+lines.map(function(l){return '<li>'+esc(l)+'</li>';}).join('')+'</ul>'+vid});});s.push({cls:'title-slide',html:'<div class="kicker">Ringkasan</div><h3>Yang sudah dipelajari</h3><ul>'+c.modules.map(function(m){return '<li>'+esc(m.t)+'</li>';}).join('')+'</ul><p style="margin-top:12px">🧪 Lanjut kerjakan Pre-Test, Post-Test & Final Test lewat menu Progress lalu Buka.</p>'});return s;}
function openSlides(cid){var c=courseById(cid);if(!c)return;SLIDES=buildSlides(c);SLIDEI=0;openModal('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><b class="muted" style="font-size:13px">📊 Materi Course — Mode Slide</b><div style="display:flex;gap:8px"><button class="btn sm ghost" id="slideFs">⛶ Fullscreen</button><button class="btn sm ghost" onclick="closeModal()">✕ Tutup</button></div></div><div id="slideWrap"><div class="slidestage" id="slideStage"></div><div class="slidenav"><button class="btn ghost sm" id="slidePrev">‹ Sebelumnya</button><div class="slidedots" id="slideDots"></div><button class="btn sm" id="slideNext">Berikutnya ›</button></div><div class="muted fskbd" style="text-align:center;font-size:11px;margin-top:8px">Panah ← → untuk pindah slide · Esc untuk keluar</div></div>');renderSlide();document.getElementById('slideFs').onclick=function(){var w=document.getElementById('slideWrap');if(document.fullscreenElement){document.exitFullscreen();}else if(w.requestFullscreen){w.requestFullscreen();}};}
function renderSlide(){var s=SLIDES[SLIDEI];if(!s)return;var st=document.getElementById('slideStage');st.className='slidestage '+(s.cls||'');st.innerHTML='<div class="snum">'+(SLIDEI+1)+' / '+SLIDES.length+'</div>'+s.html;var dots=document.getElementById('slideDots');dots.innerHTML=SLIDES.map(function(x,i){return '<span class="'+(i===SLIDEI?'on':'')+'" data-si="'+i+'"></span>';}).join('');dots.querySelectorAll('[data-si]').forEach(function(d){d.onclick=function(){SLIDEI=+d.dataset.si;renderSlide();};});var pv=document.getElementById('slidePrev'),nx=document.getElementById('slideNext');pv.disabled=SLIDEI===0;nx.disabled=SLIDEI===SLIDES.length-1;pv.onclick=function(){if(SLIDEI>0){SLIDEI--;renderSlide();}};nx.onclick=function(){if(SLIDEI<SLIDES.length-1){SLIDEI++;renderSlide();}};}

function exportCsv(){

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtBody(s){return String(s||'Materi belum tersedia.').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>`<p>${esc(l)}</p>`).join('');}
function vidEmbed(m){if(!m||!m.vid)return '';return '<div style="position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;margin-bottom:12px;background:#000"><iframe src="https://www.youtube.com/embed/'+m.vid+'" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0" allowfullscreen loading="lazy"></iframe></div><div style="margin-bottom:12px"><a class="btn sm ghost" href="https://www.youtube.com/watch?v='+m.vid+'" target="_blank" rel="noopener">▶ Buka video di YouTube</a></div>';}
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
document.addEventListener('keydown',function(e){var m=document.getElementById('modal');if(!m||!m.classList.contains('open'))return;if(!document.getElementById('slideStage'))return;if(e.key==='ArrowRight'){if(SLIDEI<SLIDES.length-1){SLIDEI++;renderSlide();}e.preventDefault();}else if(e.key==='ArrowLeft'){if(SLIDEI>0){SLIDEI--;renderSlide();}e.preventDefault();}else if(e.key==='Escape'){if(document.fullscreenElement){document.exitFullscreen();}else{closeModal();}}});
document.getElementById('globalSearch').addEventListener('keydown',e=>{if(e.key==='Enter'){render('courses');setTimeout(()=>{const s=document.getElementById('cSearch');if(s){s.value=e.target.value;courseList();}},0);}});

try{render('dashboard');}catch(err){var vv=document.getElementById('view');if(vv)vv.innerHTML='<div class="card"><b>Terjadi error:</b><br><code>'+((err&&err.message)||err)+'</code></div>';}
</script>
</body>
</html>
